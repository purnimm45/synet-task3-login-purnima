<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — InternPortal</title>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel = "stylesheet" href="style.css">

</head>

<body>

  <div class="bg-canvas" aria-hidden="true">
    <div class="bg-shape-br"></div>
  </div>


  <div class="toast" id="toast" role="status" aria-live="polite">
    <span class="toast-dot"></span>
    <span id="toast-message">Done!</span>
  </div>

  <!-- Main layout -->
  <main class="login-wrapper">
    <div class="login-card">

     
      <div class="login-brand">
        <div class="brand-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24">
            <polyline points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polyline>
          </svg>
        </div>
        <span class="brand-name">InternPortal</span>
      </div>

    
      <header class="login-heading">
        <h1>Good to see<br>you <em>again.</em></h1>
        <div class="heading-rule"></div>
        <p>Sign in to continue to your dashboard.</p>
      </header>

      <!-- Form -->
      <form class="login-form" id="login-form" novalidate>

        <div class="input-group">
          <label for="email">Email Address</label>
          <div class="input-field-wrap">
            <span class="field-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24">
                <rect x="2" y="4" width="20" height="16" rx="2"></rect>
                <path d="M2 7l10 7 10-7"></path>
              </svg>
            </span>
            <input type="email" id="email" name="email" placeholder="you@example.com" autocomplete="email required/>
          </div>
        </div>

        <div class="input-group">
          <label for="password">Password</label>
          <div class="input-field-wrap">
            <span class="field-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24">
                <rect x="3" y="11" width="18" height="11" rx="2"></rect>
                <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
              </svg>
            </span>
            <input type="password" id="password" name="password" placeholder="Enter your password" autocomplete="current-password" required/>
            <button type="button" class="toggle-password" id="toggle-pw" aria-label="Toggle password visibility">
              <svg viewBox="0 0 24 24" id="eye-icon">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                <circle cx="12" cy="12" r="3"></circle>
              </svg>
            </button>
          </div>
        </div>

        <div class="form-meta">
          <a href="#" class="forgot-link" id="forgot-link">Forgot password?</a>
        </div>

        <button type="submit" class="btn-submit" id="submit-btn">
          <span class="btn-label">Sign in</span>
          <span class="spinner" aria-hidden="true"></span>
        </button>

      </form>

      <div class="divider">or</div>

      <footer class="login-footer">
        No account yet? <a href="#">Apply here</a>
      </footer>

    </div>
  </main>

  <script>

    const form       = document.getElementById('login-form');
    const submitBtn  = document.getElementById('submit-btn');
    const togglePw   = document.getElementById('toggle-pw');
    const passwordEl = document.getElementById('password');
    const eyeIcon    = document.getElementById('eye-icon');
    const toast      = document.getElementById('toast');
    const toastMsg   = document.getElementById('toast-message');
    const forgotLink = document.getElementById('forgot-link');

    // Toggle show/hide password
    togglePw.addEventListener('click', () => {
      const isHidden = passwordEl.type === 'password';
      passwordEl.type = isHidden ? 'text' : 'password';
      eyeIcon.innerHTML = isHidden
        ? `<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"></path>
           <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"></path>
           <line x1="1" y1="1" x2="23" y2="23"></line>`
        : `<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
           <circle cx="12" cy="12" r="3"></circle>`;
    });

    // Show toast notification
    function showToast(message, isError = false) {
      toastMsg.textContent = message;
      toast.classList.toggle('error', isError);
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 3500);
    }

    // Prevent page refresh + simulate login
    form.addEventListener('submit', (e) => {
      e.preventDefault();

      const email    = document.getElementById('email').value.trim();
      const password = passwordEl.value;

      if (!email || !password) {
        showToast('Please fill in both fields.', true);
        return;
      }

      submitBtn.classList.add('loading');
      submitBtn.disabled = true;

      setTimeout(() => {
        submitBtn.classList.remove('loading');
        submitBtn.disabled = false;
        showToast('Signed in! Redirecting you now…', false);
        form.reset();
      }, 1800);
    });

    // Forgot password action
    forgotLink.addEventListener('click', (e) => {
      e.preventDefault();
      showToast('Reset link sent to your email.', false);
    });
  </script>

</body>
</html>
